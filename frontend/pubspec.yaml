# EmbyTok Flutter - 竖屏视频浏览客户端
name: embbytok_flutter
description: "EmbyTok Flutter - 为 Emby 媒体服务器设计的竖屏视频浏览客户端"
publish_to: 'none'
version: 2.20.4+2204

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^13.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  flutter_vlc_player: ^7.4.0
  screen_brightness: ^0.2.2+1
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.0
  path_provider: ^2.1.0
  open_filex: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  http_mock_adapter: ^0.6.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  coverage: ^1.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
