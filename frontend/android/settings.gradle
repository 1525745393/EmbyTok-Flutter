pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdk = properties.getProperty("flutter.sdk")
        return flutterSdk != null ? flutterSdk : System.getenv("FLUTTER_ROOT") ?: System.getProperty("flutter.sdk")
    }()
    if (flutterSdkPath != null) {
        includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
    }

    repositories {
        // 如需切换到阿里云镜像，取消下方 3 行注释，并注释掉 google() 和 mavenCentral()
        // 也可以通过环境变量 USE_ALIYUN_MIRROR=true 自动启用
        // maven { url 'https://maven.aliyun.com/repository/google' }
        // maven { url 'https://maven.aliyun.com/repository/public' }
        // maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
}

include ":app"
