# ============================================================
# EmbyTok - 生产环境 Docker Compose 配置（最小版）
# ============================================================
# 用途：从 Docker Hub 拉取官方镜像，只运行后端 API（手机 App 用户首选）
# 适用场景：
#   - 只使用手机 App（EmbyTok-Flutter APK）
#   - 不需要浏览器 Web 界面
#   - 资源受限的设备（如低配置 NAS / 树莓派）
#
# 使用方式：
#   docker compose -f docker-compose.minimal.yml up -d
#
# 镜像来源：
#   1525745393/embbytok-backend:latest   (FastAPI 后端)
# ============================================================

version: "3.8"

services:
  # =========================================================
  # EmbyTok 后端服务（FastAPI + Python 3.11）
  # 为手机 App 提供 Emby 媒体服务器的 REST API 代理
  # =========================================================
  embbytok-backend:
    image: 1525745393/embbytok-backend:latest
    container_name: embbytok-backend
    hostname: embbytok-backend
    restart: unless-stopped

    # 端口映射：主机 8000 -> 容器 8000
    ports:
      - "8000:8000"

    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=info
      # 可选：预设 Emby 服务器地址和 API Key
      #   （如在此处配置，手机 App 登录时可自动填充）
      # - EMBY_URL=http://192.168.1.100:8096
      # - EMBY_API_KEY=你的_emby_api_key

    # 健康检查：每 30 秒探测一次 /health 接口
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 资源限制（防止容器占用过多资源，可根据硬件调整）
    mem_limit: 512m
    mem_reservation: 128m
    cpus: "1.0"

    # 日志配置：限制大小，防止日志撑爆磁盘
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
