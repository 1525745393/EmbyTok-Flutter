# ===========================================================
# Docker Release 工作流
# 依赖的 GitHub Secrets:
#   DOCKER_REGISTRY   - 镜像仓库地址（可选，默认为 docker.io）
#   DOCKER_USERNAME   - Docker Hub 用户名
#   DOCKER_PASSWORD   - Docker Hub Access Token
# ===========================================================

name: Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "镜像标签（默认使用 git tag 或 latest）"
        required: false
        default: "latest"
        type: string

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================
  # 构建并推送 Docker 镜像（多架构）
  # ===========================================================
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------
      # 步骤 1：验证 Docker 认证信息
      # -----------------------------------------------------------
      - name: 验证 Docker 认证配置
        shell: bash
        run: |
          set -euo pipefail
          echo "开始验证 Docker Secrets..."

          missing=""
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            missing="${missing}DOCKER_USERNAME "
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            missing="${missing}DOCKER_PASSWORD "
          fi

          if [ -n "${missing}" ]; then
            echo ""
            echo "⚠️  缺少必需的 Docker Secrets: ${missing}"
            echo "请在仓库 Settings → Secrets and variables → Actions 中配置："
            echo "  • DOCKER_USERNAME - Docker Hub 用户名"
            echo "  • DOCKER_PASSWORD - Docker Hub Access Token"
            exit 1
          fi

          echo "✅ Docker Secrets 验证通过"

      # -----------------------------------------------------------
      # 步骤 2：解析镜像标签与元数据
      # -----------------------------------------------------------
      - name: 解析镜像标签与元数据
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "解析镜像标签与元数据..."

          # VERSION 解析
          VERSION="${{ github.event.inputs.tag || github.ref_name || 'latest' }}"
          if [[ "$VERSION" == refs/tags/* ]]; then
            VERSION="${VERSION#refs/tags/}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ 版本标签: ${VERSION}"

          # REGISTRY 解析（可选，有默认值）
          REGISTRY="${{ secrets.DOCKER_REGISTRY }}"
          if [ -z "${REGISTRY}" ]; then
            REGISTRY="docker.io"
          fi
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "✅ 镜像仓库: ${REGISTRY}"

          # OWNER 解析
          OWNER="${{ github.repository_owner }}"
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "✅ 所有者: ${OWNER}"

      - name: 登录到容器仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: backend/
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.owner }}/embbytok-backend:${{ steps.meta.outputs.VERSION }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.owner }}/embbytok-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------
      # 步骤 5：构建并推送前端 Flutter Web 镜像
      # -----------------------------------------------------------
      - name: 构建 Flutter Web
        run: |
          echo "=== 安装 Flutter SDK ==="
          curl -sL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.0-stable.tar.xz | tar xJ -C /opt
          export PATH="/opt/flutter/bin:$PATH"
          flutter config --no-analytics
          echo ""
          echo "=== Flutter 版本 ==="
          flutter --version
          echo ""
          echo "=== 构建 Flutter Web ==="
          cd ${{ github.workspace }}/frontend
          flutter pub get
          flutter build web --release 2>&1 | tee web_build.log
          echo ""
          echo "=== 检查构建产物 ==="
          ls -la build/web/ 2>/dev/null || echo "build/web 不存在"

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.owner }}/embbytok-frontend:${{ steps.meta.outputs.VERSION }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.owner }}/embbytok-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 显示镜像摘要
        run: |
          echo ""
          echo "============================================"
          echo "镜像构建与推送完成"
          echo "============================================"
          echo "后端镜像:"
          echo "  ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.owner }}/embbytok-backend:${{ steps.meta.outputs.VERSION }}"
          echo "  ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.owner }}/embbytok-backend:latest"
          echo ""
          echo "前端镜像:"
          echo "  ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.owner }}/embbytok-frontend:${{ steps.meta.outputs.VERSION }}"
          echo "  ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.owner }}/embbytok-frontend:latest"
          echo "============================================"
