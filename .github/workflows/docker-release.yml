name: Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "镜像标签（默认使用 git tag 或 latest）"
        required: false
        default: "latest"
        type: string

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================
  # 构建并推送 Docker 镜像（多架构）
  # ===========================================================
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------
      # 从 Secrets 提取标签
      # 支持配置 DOCKER_REGISTRY, DOCKER_IMAGE_NAME
      # 若未配置，默认使用 Docker Hub + embbytok-backend
      # -----------------------------------------------------------
      - name: 解析镜像标签
        id: meta
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name || 'latest' }}"
          if [[ "$VERSION" == refs/tags/* ]]; then
            VERSION="${VERSION#refs/tags/}"
          fi
          REGISTRY="${{ secrets.DOCKER_REGISTRY }}"
          if [ -z "$REGISTRY" ]; then
            REGISTRY="docker.io"
          fi
          IMAGE_NAME="${{ secrets.DOCKER_IMAGE_NAME }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${{ github.repository_owner }}/embbytok-backend"
          fi
          echo "REGISTRY=$REGISTRY"
          echo "IMAGE_NAME=$IMAGE_NAME"
          echo "VERSION=$VERSION"
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 登录到容器仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: backend/
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 显示镜像摘要
        run: |
          echo "镜像已构建并推送:"
          echo "  ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.version }}"
          echo "  ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.image_name }}:latest"
