# ===========================================================
# Secrets 配置检查工作流
# 支持手动触发（workflow_dispatch），验证所有必需的 GitHub Secrets 是否已配置
# ===========================================================

name: Secrets 配置检查

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: '显示详细检查信息'
        required: false
        default: false
        type: boolean

jobs:
  # ===========================================================
  # Android Secrets 检查
  # ===========================================================
  android-secrets-check:
    name: 检查 Android Secrets
    runs-on: ubuntu-latest
    steps:
      - name: 检查 Android Secrets 配置
        id: check
        shell: bash
        run: |
          set -euo pipefail

          echo "========================================"
          echo "检查 Android 签名配置"
          echo "========================================"
          echo ""

          # 初始化结果
          android_secrets=()
          all_passed=true

          # 检查 ANDROID_KEYSTORE
          ANDROID_KEYSTORE_VALUE="${{ secrets.ANDROID_KEYSTORE }}"
          if [ -n "$ANDROID_KEYSTORE_VALUE" ]; then
            # 注意：GitHub Actions 在日志中会将 secret 值替换为 ***，因此我们只能检查是否非空
            echo "✅ ANDROID_KEYSTORE 已配置"
            android_secrets+=("| ANDROID_KEYSTORE | keystore 文件 base64 | ✅ 已配置 |")
          else
            echo "❌ ANDROID_KEYSTORE 未配置"
            android_secrets+=("| ANDROID_KEYSTORE | keystore 文件 base64 | ❌ 缺失 |")
            all_passed=false
          fi

          # 检查 ANDROID_KEYSTORE_PWD
          if [ -n "${{ secrets.ANDROID_KEYSTORE_PWD }}" ]; then
            echo "✅ ANDROID_KEYSTORE_PWD 已配置"
            android_secrets+=("| ANDROID_KEYSTORE_PWD | keystore 密码 | ✅ 已配置 |")
          else
            echo "❌ ANDROID_KEYSTORE_PWD 未配置"
            android_secrets+=("| ANDROID_KEYSTORE_PWD | keystore 密码 | ❌ 缺失 |")
            all_passed=false
          fi

          # 检查 ANDROID_KEY_ALIAS
          if [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "✅ ANDROID_KEY_ALIAS 已配置"
            android_secrets+=("| ANDROID_KEY_ALIAS | key 别名 | ✅ 已配置 |")
          else
            echo "❌ ANDROID_KEY_ALIAS 未配置"
            android_secrets+=("| ANDROID_KEY_ALIAS | key 别名 | ❌ 缺失 |")
            all_passed=false
          fi

          # 检查 ANDROID_KEY_PWD
          if [ -n "${{ secrets.ANDROID_KEY_PWD }}" ]; then
            echo "✅ ANDROID_KEY_PWD 已配置"
            android_secrets+=("| ANDROID_KEY_PWD | key 密码 | ✅ 已配置 |")
          else
            echo "❌ ANDROID_KEY_PWD 未配置"
            android_secrets+=("| ANDROID_KEY_PWD | key 密码 | ❌ 缺失 |")
            all_passed=false
          fi

          echo ""
          if [ "${all_passed}" = true ]; then
            echo "✅ Android Secrets 全部配置完成！"
          else
            echo "⚠️  Android Secrets 配置不完整，请补充缺失项"
          fi

          # 输出到 GitHub Step Summary
          {
            echo "## Android Secrets 配置检查结果"
            echo ""
            echo "| Secret 名称 | 用途 | 状态 |"
            echo "|------------|------|------|"
            for row in "${android_secrets[@]}"; do
              echo "${row}"
            done
            echo ""
            if [ "${all_passed}" = true ]; then
              echo "✅ **状态：全部配置完成**"
            else
              echo "⚠️ **状态：配置不完整**"
              echo ""
              echo "请在 [仓库 Settings → Secrets and variables → Actions](https://github.com/${{ github.repository }}/settings/secrets/actions) 中添加缺失的 Secrets。"
            fi
          } >> $GITHUB_STEP_SUMMARY

          # 如果不全部通过，标记为成功但输出警告（不阻止工作流）
          if [ "${all_passed}" = false ]; then
            echo "::warning::Android Secrets 配置不完整，请补充缺失项"
          fi

  # ===========================================================
  # Docker Secrets 检查
  # ===========================================================
  docker-secrets-check:
    name: 检查 Docker Secrets
    runs-on: ubuntu-latest
    steps:
      - name: 检查 Docker Secrets 配置
        id: check
        shell: bash
        run: |
          set -euo pipefail

          echo "========================================"
          echo "检查 Docker 认证配置"
          echo "========================================"
          echo ""

          docker_secrets=()
          all_passed=true

          # 检查 DOCKER_USERNAME
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "✅ DOCKER_USERNAME 已配置"
            docker_secrets+=("| DOCKER_USERNAME | Docker Hub 用户名 | ✅ 已配置 |")
          else
            echo "❌ DOCKER_USERNAME 未配置"
            docker_secrets+=("| DOCKER_USERNAME | Docker Hub 用户名 | ❌ 缺失 |")
            all_passed=false
          fi

          # 检查 DOCKER_PASSWORD
          if [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "✅ DOCKER_PASSWORD 已配置"
            docker_secrets+=("| DOCKER_PASSWORD | Docker Access Token | ✅ 已配置 |")
          else
            echo "❌ DOCKER_PASSWORD 未配置"
            docker_secrets+=("| DOCKER_PASSWORD | Docker Access Token | ❌ 缺失 |")
            all_passed=false
          fi

          # 检查 DOCKER_REGISTRY（可选）
          if [ -n "${{ secrets.DOCKER_REGISTRY }}" ]; then
            echo "✅ DOCKER_REGISTRY 已配置：${{ secrets.DOCKER_REGISTRY }}"
            docker_secrets+=("| DOCKER_REGISTRY | 镜像仓库地址 | ✅ 已配置 |")
          else
            echo "ℹ️  DOCKER_REGISTRY 未配置（可选，将使用默认值 docker.io）"
            docker_secrets+=("| DOCKER_REGISTRY | 镜像仓库地址 | ℹ️ 未配置（默认 docker.io） |")
          fi

          echo ""
          if [ "${all_passed}" = true ]; then
            echo "✅ Docker Secrets 全部配置完成！"
          else
            echo "⚠️  Docker Secrets 配置不完整，请补充缺失项"
          fi

          # 输出到 GitHub Step Summary
          {
            echo "## Docker Secrets 配置检查结果"
            echo ""
            echo "| Secret 名称 | 用途 | 状态 |"
            echo "|------------|------|------|"
            for row in "${docker_secrets[@]}"; do
              echo "${row}"
            done
            echo ""
            if [ "${all_passed}" = true ]; then
              echo "✅ **状态：全部配置完成**"
            else
              echo "⚠️ **状态：配置不完整**"
              echo ""
              echo "请在 [仓库 Settings → Secrets and variables → Actions](https://github.com/${{ github.repository }}/settings/secrets/actions) 中添加缺失的 Secrets。"
            fi
          } >> $GITHUB_STEP_SUMMARY

          if [ "${all_passed}" = false ]; then
            echo "::warning::Docker Secrets 配置不完整，请补充缺失项"
          fi

  # ===========================================================
  # 汇总报告
  # ===========================================================
  summary:
    name: 配置汇总
    runs-on: ubuntu-latest
    needs: [android-secrets-check, docker-secrets-check]
    steps:
      - name: 生成汇总报告
        shell: bash
        run: |
          set -euo pipefail

          echo "========================================"
          echo "Secrets 配置检查汇总"
          echo "========================================"
          echo ""
          echo "请查看上方各检查步骤的详细报告。"
          echo ""
          echo "### 快速链接"
          echo "- [查看 Android Secrets 检查](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs)"
          echo "- [GitHub Secrets 设置页面](https://github.com/${{ github.repository }}/settings/secrets/actions)"
          echo ""
          echo "### 下一步"
          echo "1. 补齐缺失的 Secrets"
          echo "2. 运行此工作流重新验证"
          echo "3. 测试发布流程：推送 tag \`git tag v0.1.0 && git push --tags\`"

          # 输出到 Step Summary
          {
            echo "## Secrets 配置检查汇总"
            echo ""
            echo "✅ **检查完成！** 请查看上方各步骤的详细结果。"
            echo ""
            echo "### 快速链接"
            echo "- [查看检查详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- [GitHub Secrets 设置页面](https://github.com/${{ github.repository }}/settings/secrets/actions)"
            echo ""
            echo "### 配置指南"
            echo "详细配置说明请参阅 [.github/SECRETS.md](.github/SECRETS.md)"
          } >> $GITHUB_STEP_SUMMARY
