name: CI - Test, Lint & Build

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================
  # Flutter 测试 & 静态分析
  # ===========================================================
  flutter-test:
    name: Flutter 测试 & 分析
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.24.0"
          cache: true

      - name: 安装依赖
        run: flutter pub get
        working-directory: frontend

      - name: 代码分析
        run: flutter analyze --no-pub
        working-directory: frontend

      - name: 运行测试
        run: flutter test --coverage
        working-directory: frontend

      - name: 上传测试覆盖率报告
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: frontend/coverage/lcov.info
          if-no-files-found: ignore

  # ===========================================================
  # Python 后端测试
  # ===========================================================
  python-test:
    name: Python 后端测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: python -m pip install -r backend/requirements.txt

      - name: 运行 pytest
        run: |
          if [ -d "backend/tests" ]; then
            cd backend && python -m pytest -v
          else
            echo "未找到 backend/tests 目录，跳过 Python 测试"
          fi

  # ===========================================================
  # Docker 镜像构建验证
  # ===========================================================
  docker-build:
    name: Docker 镜像构建验证
    runs-on: ubuntu-latest
    needs: [flutter-test, python-test]
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 构建后端 Docker 镜像
        run: docker build -t embbytok-backend:ci-test backend/

      - name: 验证镜像存在
        run: docker images embbytok-backend:ci-test
