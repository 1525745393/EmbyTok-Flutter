# ===========================================================
# PR 提交规范检查
#
# 检查 PR 标题是否符合 Conventional Commits 规范：
#   feat: 新功能（触发 minor 版本升级）
#   fix:  修复 bug（触发 patch 版本升级）
#   feat!:/fix!: 破坏性变更（触发 major 版本升级）
#   docs: 文档变更（不触发版本升级）
#   style/refactor/perf/test/build/ci/chore/revert: 其他类型
#
# 示例：
#   ✓ feat: 增加沉浸式交互
#   ✓ fix: 解决滑动时工具栏动画抖动
#   ✗ 随便改一下（不通过）
#
# 用途：保证 Squash Merge 后的 commit message 符合规范，
#      以便 semantic-release 能正确识别版本号变化
# ===========================================================

name: PR Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint:
    name: PR 标题规范检查
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 允许的提交类型（与 semantic-release commit-analyzer 的默认配置一致）
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # 可选：要求 subject（冒号后的第一句）首字母大写
          # subjectPattern: ^[A-Z]
