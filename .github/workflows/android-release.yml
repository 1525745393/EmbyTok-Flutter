# ===========================================================
# Android Release 工作流
# 签名配置说明：
#   1. 生成 keystore:
#      keytool -genkey -v -keystore embbytok-keystore.jks \
#        -keyalg RSA -keysize 2048 -validity 36500 -alias embbytok
#   2. Base64 编码 keystore:
#      base64 -w 0 embbytok-keystore.jks > keystore_base64.txt
#   3. 在 GitHub Secrets (仓库 Settings → Secrets and variables → Actions) 中配置:
#      ANDROID_KEYSTORE       - keystore 文件的 base64 编码（上一步输出的内容）
#      ANDROID_KEYSTORE_PWD   - keystore 密码
#      ANDROID_KEY_ALIAS      - key 别名（默认 embbytok）
#      ANDROID_KEY_PWD        - key 密码（通常与 keystore 密码相同）
#   4. 若 Secrets 中存在 ANDROID_KEYSTORE，则构建时会自动：
#      - 将 base64 解码为 frontend/android/app/embbytok-keystore.jks
#      - 生成 frontend/android/key.properties 配置文件
#      - 使用 release 签名进行构建
#      若 Secrets 中不存在 ANDROID_KEYSTORE，则降级使用 Android debug 签名
# ===========================================================

name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "发布类型"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================
  # Android 签名构建
  # ===========================================================
  build-android:
    name: Android 签名构建
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_TYPE: ${{ github.event.inputs.release_type || 'release' }}
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ANDROID_KEYSTORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PWD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PWD: ${{ secrets.ANDROID_KEY_PWD }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 还原 release 签名 keystore 和 key.properties
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$ANDROID_KEYSTORE" ] && [ -n "$ANDROID_KEYSTORE_PWD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PWD" ]; then
            echo "$ANDROID_KEYSTORE" | base64 -d > frontend/android/app/embbytok-keystore.jks
            echo "✅ 已配置签名密钥，keystore 已还原: frontend/android/app/embbytok-keystore.jks"
            ls -lh frontend/android/app/embbytok-keystore.jks

            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n" \
              "$ANDROID_KEYSTORE_PWD" "$ANDROID_KEY_PWD" "$ANDROID_KEY_ALIAS" "app/embbytok-keystore.jks" \
              > frontend/android/key.properties
            echo "✅ key.properties 已生成: frontend/android/key.properties"
          else
            echo "ℹ️  未配置 ANDROID_KEYSTORE 系列 Secrets，将使用 Android debug 签名进行构建"
            echo "   如需使用正式签名，请在仓库 Settings → Secrets and variables → Actions 中配置："
            echo "   ANDROID_KEYSTORE / ANDROID_KEYSTORE_PWD / ANDROID_KEY_ALIAS / ANDROID_KEY_PWD"
          fi

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.24.0"
          cache: true

      - name: 安装依赖
        run: flutter pub get
        working-directory: frontend

      - name: Flutter 环境诊断
        run: |
          echo "=== Flutter Version ==="
          flutter --version
          echo ""
          echo "=== 签名文件检查 ==="
          if [ -f "android/key.properties" ]; then
            echo "✅ 已找到 android/key.properties，将使用 release 签名"
            ls -lh android/app/embbytok-keystore.jks 2>/dev/null || true
          else
            echo "ℹ️  未找到 android/key.properties，将使用 debug 签名构建"
          fi
        working-directory: frontend

      - name: 构建 APK (split per ABI)
        shell: bash
        run: flutter build apk --${BUILD_TYPE} --split-per-abi
        working-directory: frontend

      - name: 构建 App Bundle (AAB)
        shell: bash
        if: ${{ env.BUILD_TYPE == 'release' }}
        run: flutter build appbundle --${BUILD_TYPE}
        working-directory: frontend

      - name: 检查构建产物
        shell: bash
        run: |
          set -euo pipefail
          echo "=== 检查 APK 路径 ==="
          find frontend/build -name "*.apk" 2>/dev/null || { echo "❌ 未找到 APK 产物"; exit 1; }
          echo ""
          echo "=== 检查 AAB 路径 ==="
          find frontend/build -name "*.aab" 2>/dev/null || { echo "⚠️  未找到 AAB 产物（debug 模式正常）"; }

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ env.BUILD_TYPE }}
          path: frontend/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: 上传 AAB 产物
        if: ${{ env.BUILD_TYPE == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release
          path: frontend/build/app/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/build/app/outputs/flutter-apk/*.apk
            frontend/build/app/outputs/bundle/release/*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
