# ===========================================================
# Android Release 工作流
# 说明：当前使用 Android SDK 自带的 debug 签名密钥进行构建
# 如需正式发布到应用商店，请按以下步骤配置 release 签名：
#   1. 生成 keystore: keytool -genkey -v -keystore embbytok-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias embbytok
#   2. 在 GitHub Secrets 中配置:
#      ANDROID_KEYSTORE       - keystore 文件的 base64 编码
#      ANDROID_KEYSTORE_PWD   - keystore 密码
#      ANDROID_KEY_ALIAS      - key 别名 (embbytok)
#      ANDROID_KEY_PWD        - key 密码
#   3. 将 frontend/android/app/build.gradle 中的
#      signingConfig signingConfigs.debug
#      改为 signingConfig signingConfigs.release
# ===========================================================

name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "发布类型"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================
  # Android 签名构建
  # ===========================================================
  build-android:
    name: Android 签名构建
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_TYPE: ${{ github.event.inputs.release_type || 'release' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.24.0"
          cache: true

      - name: 安装依赖
        run: flutter pub get
        working-directory: frontend

      - name: Flutter 环境诊断
        run: |
          echo "=== Flutter Version ==="
          flutter --version
          echo ""
          echo "=== Flutter Doctor ==="
          flutter doctor 2>&1 | head -20 || true
        working-directory: frontend

      - name: 构建 APK (split per ABI)
        shell: bash
        run: flutter build apk --${BUILD_TYPE} --split-per-abi
        working-directory: frontend

      - name: 构建 App Bundle (AAB)
        shell: bash
        if: ${{ env.BUILD_TYPE == 'release' }}
        run: flutter build appbundle --${BUILD_TYPE}
        working-directory: frontend

      - name: 检查构建产物
        shell: bash
        run: |
          set -euo pipefail
          echo "=== 检查 APK 路径 ==="
          find frontend/build -name "*.apk" 2>/dev/null || { echo "❌ 未找到 APK 产物"; exit 1; }
          echo ""
          echo "=== 检查 AAB 路径 ==="
          find frontend/build -name "*.aab" 2>/dev/null || { echo "⚠️  未找到 AAB 产物（debug 模式正常）"; }

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ env.BUILD_TYPE }}
          path: frontend/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: 上传 AAB 产物
        if: ${{ env.BUILD_TYPE == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release
          path: frontend/build/app/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/build/app/outputs/flutter-apk/*.apk
            frontend/build/app/outputs/bundle/release/*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
