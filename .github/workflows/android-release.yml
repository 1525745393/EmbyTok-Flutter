# ===========================================================
# Android Release 自动化工作流（参考文章：Android项目的持续集成与自动化发布实践）
#
# 核心流程：push main → Semantic Release 分析提交 → 自动决定版本号 →
#          更新 pubspec.yaml → 生成 CHANGELOG → 构建签名 APK/AAB →
#          创建 Git Tag → 创建 GitHub Release → 上传构建产物
#
# 触发条件：
#   1. push 到 main 分支（标准发布流程）
#   2. workflow_dispatch（手动触发，用于应急）
#
# 依赖的 GitHub Secrets:
#   ANDROID_KEYSTORE     - keystore 文件的 base64 编码内容
#   ANDROID_KEYSTORE_PWD - keystore 密码
#   ANDROID_KEY_ALIAS    - key 别名（默认: embbytok）
#   ANDROID_KEY_PWD      - key 密码
# ===========================================================

name: Android Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================
  # Semantic Release + 构建 + 发布
  # ===========================================================
  release:
    name: 自动化发布
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: 检出代码（完整历史，供 Semantic Release 分析）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 设置 JDK 17（Gradle 构建需要）
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 设置 Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.24.0"
          cache: true

      - name: 设置 Node.js（运行 semantic-release）
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Flutter 依赖
        run: flutter pub get
        working-directory: frontend

      - name: 安装 Semantic Release 及其插件
        run: |
          npm install -g \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github

      - name: 执行 Semantic Release（自动化发布流程）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PWD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PWD: ${{ secrets.ANDROID_KEY_PWD }}
        run: npx semantic-release
